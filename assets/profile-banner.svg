<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AmazingCYJ anime coding banner</title>
  <desc id="desc">A pastel anime-inspired developer banner with a chibi coder, terminal panels, stars, and project labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7FB"/>
      <stop offset="0.43" stop-color="#F1FBFF"/>
      <stop offset="1" stop-color="#FFF9E8"/>
    </linearGradient>
    <linearGradient id="panel" x1="128" y1="56" x2="1030" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF3FA"/>
    </linearGradient>
    <linearGradient id="hair" x1="846" y1="79" x2="948" y2="191" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2B2447"/>
      <stop offset="1" stop-color="#6C4AB6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#FF77B7" flood-opacity="0.18"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#FFE2F0" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="32" fill="url(#bg)"/>
